---
# ==============================================================================
# NIST HARDENING SUITE | Developmi | Miguel Lozano (SRE & FinOps Architect)
# ==============================================================================
# LAYER 1: BOOTSTRAP - Base System and VPN
# ==============================================================================
# Purpose: Prepare bare-metal servers for standalone Docker
# Connectivity: Automatic PUBLIC IP usage (uses 'public_ip' from hosts.ini)
# Prerequisites: Servers provisioned with Tofu (Layer 0)
#
# Run:
#   ansible-playbook -i inventory/hosts.ini site.yml --ask-vault-pass
#
# Behavior:
#   - Each play automatically uses the 'public_ip' variable from hosts.ini
#   - After Tailscale installation, VPN IPs are discovered (100.x.x.x)
#   - User must update hosts.ini manually with Tailscale IPs
#   - Future runs (stacks.yml) should use Tailscale IPs
#
# Post-run:
#   1. Verify Tailscale IPs in PHASE 5 output
#   2. Edit hosts.ini and replace ansible_host with Tailscale IPs (100.x.x.x)
#   3. Continue with stacks.yml using the updated hosts.ini
# ==============================================================================

# ==============================================================================
# PHASE 0: SECRETS VALIDATION
# ==============================================================================
- name: "PHASE 0: Pre-flight Validation"
  hosts: localhost
  gather_facts: true
  become: false
  tags: [always]
  tasks:
    - name: Validate vault variables
      ansible.builtin.assert:
        that:
          - vault_github_token is defined
          - vault_github_token | length > 0
          - tailscale_auth_key is defined
          - tailscale_auth_key | length > 0
          - github_username is defined
          - github_username | length > 0
        fail_msg: "❌ Vault secrets missing. Run: ansible-vault edit group_vars/all/secrets.yml"
        success_msg: "✅ Vault variables validated"

- name: "PHASE 0.1: APT Lock Pre-flight"
  hosts: all
  become: true
  gather_facts: false
  any_errors_fatal: true
  max_fail_percentage: 0
  tags: [always]
  pre_tasks:
    - name: "Pre-flight: Stop APT systemd timers"
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
        enabled: false
      loop:
        - apt-daily.timer
        - apt-daily-upgrade.timer
      failed_when: false

    - name: "Pre-flight: Track timer state for restore"
      ansible.builtin.set_fact:
        apt_timers_stopped: true
        cacheable: false

    - name: "Pre-flight: Detect APT lock holders"
      ansible.builtin.shell: |
        fuser /var/lib/apt/lists/lock /var/lib/dpkg/lock /var/lib/dpkg/lock-frontend /var/cache/apt/archives/lock 2>/dev/null
      register: apt_lock_holders
      changed_when: false
      failed_when: false

    - name: "Pre-flight: Enumerate running apt/dpkg processes"
      ansible.builtin.shell: |
        pgrep -a '^(apt|apt-get|dpkg)$'
      register: apt_processes
      changed_when: false
      failed_when: false

    - name: "Pre-flight: Inspect lock holder process age"
      ansible.builtin.shell: |
        for pid in $(echo "{{ apt_lock_holders.stdout }}" | tr ' ' '\n' | grep -E '^[0-9]+$' | sort -u); do
          etimes=$(ps -o etimes= -p $pid 2>/dev/null || echo "unknown")
          cmd=$(ps -o args= -p $pid 2>/dev/null || echo "unknown")
          echo "PID=$pid ELAPSED=${etimes}s CMD='${cmd}'"
        done
      register: apt_lock_process_info
      changed_when: false
      failed_when: false
      when: apt_lock_holders.stdout != ""

    - name: "Pre-flight: Auto-kill stale apt processes or force-kill"
      ansible.builtin.shell: |
        force="{{ apt_force_cleanup | default(false) | bool }}"
        killed=false
        for pid in $(echo "{{ apt_lock_holders.stdout }}" | tr ' ' '\n' | grep -E '^[0-9]+$' | sort -u); do
          etimes=$(ps -o etimes= -p $pid 2>/dev/null || echo "0")
          cmd=$(ps -o args= -p $pid 2>/dev/null || echo "unknown")
          if [ "$force" = "True" ]; then
            kill -9 $pid 2>/dev/null && echo "KILLED (forced) PID=$pid CMD='${cmd}'" && killed=true
          elif [ "$etimes" -gt 900 ] 2>/dev/null; then
            kill -9 $pid 2>/dev/null && echo "KILLED (stale, ${etimes}s) PID=$pid CMD='${cmd}'" && killed=true
          fi
        done
        if [ "$killed" = "true" ]; then
          rm -f /var/lib/apt/lists/lock /var/lib/dpkg/lock /var/lib/dpkg/lock-frontend /var/cache/apt/archives/lock 2>/dev/null
          dpkg --configure -a 2>/dev/null || true
          echo "CLEANUP: stale lock files removed, dpkg reconfigured"
        else
          echo "NOOP: no processes eligible for cleanup (use --extra-vars \"apt_force_cleanup=true\" to force)"
        fi
      register: apt_lock_cleanup
      changed_when: "'KILLED' in apt_lock_cleanup.stdout"
      failed_when: false
      when: apt_lock_holders.stdout != ""

    - name: "Pre-flight: Re-check lock after cleanup"
      ansible.builtin.shell: |
        fuser /var/lib/apt/lists/lock /var/lib/dpkg/lock /var/lib/dpkg/lock-frontend /var/cache/apt/archives/lock 2>/dev/null
      register: apt_lock_recheck
      changed_when: false
      failed_when: false
      when:
        - apt_lock_holders.stdout != ""
        - "'KILLED' in apt_lock_cleanup.stdout"

    - name: "Pre-flight: Fail if APT lock persists after cleanup"
      ansible.builtin.fail:
        msg: |
          ⛔ APT LOCK CONTENTION on {{ inventory_hostname }}:
          Lock holder(s): {{ apt_lock_holders.stdout | default('(unable to detect)') }}
          Running apt/dpkg: {{ apt_processes.stdout | default('(none)') }}
          Process details: {{ apt_lock_process_info.stdout | default('(unable to inspect)') }}
          Cleanup result: {{ apt_lock_cleanup.stdout | default('(no cleanup attempted)') }}
          → APT systemd timers were auto-stopped by this playbook.
          → Auto-cleanup was attempted for stale processes (>15 min runtime).
          → To force-kill ALL lock holders, re-run with:
            --extra-vars "apt_force_cleanup=true"
          → Or SSH into {{ inventory_hostname }} and investigate manually.
      when:
        - apt_lock_holders.stdout != ""
        - (apt_lock_cleanup.stdout | default('NOOP')) is not search('KILLED') or (apt_lock_recheck.stdout | default('')) != ""

# ==============================================================================
# PHASE 1: BASE SYSTEM CONFIGURATION
# ==============================================================================
- name: "PHASE 1: Base System Configuration"
  hosts: all
  become: true
  gather_facts: true
  any_errors_fatal: true
  max_fail_percentage: 0
  tags: [base, system, packages]
  pre_tasks:
    - name: "Bootstrap: Use public IP (Tailscale not yet configured)"
      ansible.builtin.set_fact:
        ansible_host: "{{ public_ip }}"
      when:
        - public_ip is defined
        - not ansible_host.startswith('100.')
      tags: [always]

    - name: "Pre-flight: Stop APT systemd timers"
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
        enabled: false
      loop:
        - apt-daily.timer
        - apt-daily-upgrade.timer
      failed_when: false

    - name: "Pre-flight: Track timer state for restore"
      ansible.builtin.set_fact:
        apt_timers_stopped: true
        cacheable: false

  tasks:
    - block:
        - name: "Apply common role"
          ansible.builtin.include_role:
            name: common
      rescue:
        - name: "Recovery: Restore APT systemd timers"
          ansible.builtin.systemd:
            name: "{{ item }}"
            state: started
            enabled: true
          loop:
            - apt-daily.timer
            - apt-daily-upgrade.timer
          when: apt_timers_stopped | default(false)
          failed_when: false
        - name: "Recovery: Clear timer tracking fact"
          ansible.builtin.set_fact:
            apt_timers_stopped: false
          when: apt_timers_stopped | default(false)

# ==============================================================================
# PHASE 2: SECURITY HARDENING
# ==============================================================================
