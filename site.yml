# ==============================================================================
# PHASE 3: VPN MESH NETWORK
# ==============================================================================
- name: "PHASE 3: Tailscale VPN Mesh"
  hosts: all
  become: true
  gather_facts: true
  any_errors_fatal: true
  max_fail_percentage: 0
  tags: [vpn, tailscale, networking]
  pre_tasks:
    - name: "Bootstrap: Use public IP (Tailscale not yet configured)"
      ansible.builtin.set_fact:
        ansible_host: "{{ public_ip }}"
      when:
        - public_ip is defined
        - not ansible_host.startswith('100.')
      tags: [always]

  tasks:
    - block:
        - name: "Apply tailscale_client role"
          ansible.builtin.include_role:
            name: tailscale_client
      rescue:
        - name: "Recovery: Restore APT systemd timers"
          ansible.builtin.systemd:
            name: "{{ item }}"
