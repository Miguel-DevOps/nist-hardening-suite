---
# ==============================================================================
# NIST HARDENING SUITE | Developmi | Miguel Lozano (SRE & FinOps Architect)
# ==============================================================================
# LAYER 1: BOOTSTRAP - Base System and VPN
# ==============================================================================
# Purpose: Prepare bare-metal servers for standalone Docker
# Connectivity: Automatic PUBLIC IP usage (uses 'public_ip' from hosts.ini)
# Prerequisites: Servers provisioned with Tofu (Layer 0)
#
# Run:
#   ansible-playbook -i inventory/hosts.ini site.yml --ask-vault-pass
#
# Behavior:
#   - Each play automatically uses the 'public_ip' variable from hosts.ini
#   - After Tailscale installation, VPN IPs are discovered (100.x.x.x)
#   - User must update hosts.ini manually with Tailscale IPs
#   - Future runs (stacks.yml) should use Tailscale IPs
#
# Post-run:
#   1. Verify Tailscale IPs in PHASE 5 output
#   2. Edit hosts.ini and replace ansible_host with Tailscale IPs (100.x.x.x)
#   3. Continue with stacks.yml using the updated hosts.ini
# ==============================================================================

# ==============================================================================
# PHASE 0: SECRETS VALIDATION
# ==============================================================================
- name: "PHASE 0: Pre-flight Validation"
  hosts: localhost
  gather_facts: true
  become: false
  tags: [always]

  tasks:
    - name: Validate vault variables
      ansible.builtin.assert:
        that:
          - vault_github_token is defined
          - vault_github_token | length > 0
          - tailscale_auth_key is defined
          - tailscale_auth_key | length > 0
          - github_username is defined
          - github_username | length > 0
        fail_msg: "❌ Vault secrets missing. Run: ansible-vault edit group_vars/all/secrets.yml"
        success_msg: "✅ Vault variables validated"

# ==============================================================================
# PHASE 1: BASE SYSTEM CONFIGURATION
# ==============================================================================
- name: "PHASE 1: Base System Configuration"
  hosts: all
  become: true
  gather_facts: true
  max_fail_percentage: 0
  tags: [base, system, packages]

  pre_tasks:
    - name: "Bootstrap: Use public IP (Tailscale not yet configured)"
      set_fact:
        ansible_host: "{{ public_ip }}"
      when: public_ip is defined
      tags: [always]

  roles:
    - common

# ==============================================================================
# PHASE 2: SECURITY HARDENING
# ==============================================================================
- name: "PHASE 2: Security & SSH Hardening"
  hosts: all
  become: true
  gather_facts: false
  any_errors_fatal: true
  max_fail_percentage: 0
  tags: [security, firewall, ssh, fail2ban]

  pre_tasks:
    - name: "Bootstrap: Use public IP (Tailscale not yet configured)"
      set_fact:
        ansible_host: "{{ public_ip }}"
      when: public_ip is defined
      tags: [always]

  roles:
    - security

# ==============================================================================
# PHASE 2.5: INTRUSION PREVENTION (CrowdSec)
# ==============================================================================
- name: "PHASE 2.5: Intrusion Prevention System (CrowdSec)"
  hosts: all
  become: true
  gather_facts: true
  any_errors_fatal: true
  max_fail_percentage: 0
  tags: [security, crowdsec, ips, si-4]

  pre_tasks:
    - name: "Bootstrap: Use public IP (Tailscale not yet configured)"
      set_fact:
        ansible_host: "{{ public_ip }}"
      when: public_ip is defined
      tags: [always]

  roles:
    - crowdsec

# ==============================================================================
# PHASE 3: VPN MESH NETWORK
# ==============================================================================
- name: "PHASE 3: Tailscale VPN Mesh"
  hosts: all
  become: true
  gather_facts: true
  any_errors_fatal: true
  max_fail_percentage: 0
  tags: [vpn, tailscale, networking]

  pre_tasks:
    - name: "Bootstrap: Use public IP (Tailscale not yet configured)"
      set_fact:
        ansible_host: "{{ public_ip }}"
      when: public_ip is defined
      tags: [always]

  roles:
    - tailscale_client

# ==============================================================================
# PHASE 4: DOCKER ENGINE
# ==============================================================================
- name: "PHASE 4: Docker Engine Installation"
  hosts: all
  become: true
  gather_facts: false
  any_errors_fatal: true
  max_fail_percentage: 0
  tags: [docker, containers, runtime]

  pre_tasks:
    - name: "Bootstrap: Use public IP (Tailscale not yet configured)"
      set_fact:
        ansible_host: "{{ public_ip }}"
      when: public_ip is defined
      tags: [always]

  roles:
    - docker

# ==============================================================================
# PHASE 5: BOOTSTRAP VERIFICATION
# ==============================================================================
- name: "PHASE 5: Bootstrap Verification"
  hosts: all
  gather_facts: false
  become: true
  tags: [verification, status]

  pre_tasks:
    - name: "Bootstrap: Use public IP (Tailscale not yet configured)"
      set_fact:
        ansible_host: "{{ public_ip }}"
      when: public_ip is defined
      tags: [always]

  tasks:
    - name: Get Tailscale IP
      ansible.builtin.command: tailscale ip -4
      register: ts_ip
      changed_when: false

    - name: Get Docker version
      ansible.builtin.command: docker --version
      register: docker_ver
      changed_when: false

    - name: Display server status
      ansible.builtin.debug:
        msg:
          - "=== {{ inventory_hostname }} ==="
          - "🌐 Public IP: {{ public_ip | default('N/A') }}"
          - "🔒 VPN IP: {{ ts_ip.stdout }}"
          - "🐳 {{ docker_ver.stdout }}"
          - >
            {% if inventory_hostname in groups['brain'] %}
            🧠 Brain: Management Node (Hetzner)
            {% else %}💪 Muscle: Compute Node (Oracle){% endif %}

# ==============================================================================
# POST-BOOTSTRAP INSTRUCTIONS
# ==============================================================================
- name: "Post-Bootstrap Instructions"
  hosts: localhost
  gather_facts: false
  become: false
  tags: [always]

  tasks:
    - name: Display next steps
      ansible.builtin.debug:
        msg:
          - ""
          - "=========================================="
          - "BOOTSTRAP COMPLETED (LAYER 1)"
          - "=========================================="
          - ""
          - "MANUAL ACTION REQUIRED:"
          - "  1. Copy inventory:"
          - "     cp inventory/hosts.ini.generated inventory/hosts.ini"
          - ""
          - "  2. Edit hosts.ini and replace ansible_host with Tailscale IPs:"
          - "     brain-hetzner ansible_host=100.85.33.58 #IP example ..."
          - "     muscle-oci-1  ansible_host=100.80.244.63 #IP example ..."
          - ""
          - "  3. Run Layer 2 (Orchestration):"
          - "     ansible-playbook -i inventory/hosts.ini stacks.yml --ask-vault-pass"
          - ""
          - "  Security Status:"
          - "  ✅ SSH password auth DISABLED (keys only)"
          - "  ✅ Fail2ban active (3 attempts = 1h ban)"
          - "  ✅ UFW enabled with Docker ports configured"
          - "  ✅ Tailscale VPN mesh established"
          - ""
          - " Compliance Audit (Optional):"
          - " Run compliance audit with:"
          - "  ansible-playbook -i inventory/hosts.ini site.yml --tags compliance"
          - ""
          - "=========================================="
