# -----------------------------------------------------------------------------
# REVERSE PROXY & INGRESS
# -----------------------------------------------------------------------------
# Custom image namespace (change to your own registry)
image_namespace: "ghcr.io/miguel-devops"
caddy_image: "{{ image_namespace }}/caddy-waf:v2.11"
# Optional SHA256 digest for supply chain verification
# caddy_image_digest: "sha256:..."

# GitHub Container Registry authentication
github_username: "MiguelDevOps" # Change for private registry or repos
# -----------------------------------------------------------------------------
# PORTAINER MANAGEMENT STACK
# -----------------------------------------------------------------------------
portainer_server_image: "portainer/portainer-ee:2.39.0"
portainer_edge_agent_image: "portainer/agent:2.39.0"
portainer_server_url: "https://{{ groups['brain'][0] }}:9443"  # Brain hostname:9443 (Tailscale DNS)
portainer_edge_insecure_poll: false  # Set true if using self-signed certs

# ==============================================================================
# GLOBAL CONFIGURATION - Archipelago Architecture
# ==============================================================================
# Global variables shared across all nodes
# Brain (Hetzner): Observabilidad + Ingress
# Muscle (OCI): Autonomous nodes with full stack (App+DB+Redis)
# ==============================================================================

cluster_name: "Archipelago"
timezone: "UTC"

# -----------------------------------------------------------------------------
# FILESYSTEM PATHS (Standardized)
# -----------------------------------------------------------------------------
app_base_dir: "/srv/app"

# Container user IDs (default: first non-root user)
caddy_user_uid: 1000
caddy_user_gid: 1000

# -----------------------------------------------------------------------------
# NETWORK CONFIGURATION (Tailscale Zero Trust)
# -----------------------------------------------------------------------------
# MTU optimized for WAN + WireGuard encryption
tailscale_mtu: 1280

# Tailscale metrics (exported to VictoriaMetrics)
tailscale_metrics_port: 5252

# -----------------------------------------------------------------------------
# ANSIBLE RUNTIME
# -----------------------------------------------------------------------------
ansible_python_interpreter: /usr/bin/python3

# OBSERVABILITY
victoriametrics_image: "victoriametrics/victoria-metrics:v1.137.0"
loki_image: "grafana/loki:3.6.7"
grafana_image: "grafana/grafana:12.4.0"
node_exporter_image: "prom/node-exporter:v1.10.2"
cadvisor_image: "ghcr.io/google/cadvisor:v0.56.2"
