---
# =============================================================================
# BRAIN SERVER - MAIN CONFIGURATION
# =============================================================================
# Variables generales para servidores brain
# =============================================================================

# Server role identification
server_role: brain
server_type: management
cloud_provider: hetzner

# Portainer Edge-only routing:
# brains associate their own Edge Agent to themselves by default.
portainer_edge_target_brain: "{{ inventory_hostname }}"

# Observability
# Brain hosts the monitoring stack UI/services and may also export local metrics.
enable_observability_stack: true
enable_metrics_exporters: true
monitoring_port: 9100

# Backup configuration (for future use)
enable_backups: true
backup_retention_days: 30
