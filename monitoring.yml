---
# ==============================================================================
# NIST HARDENING SUITE | Optional Observability Deployment
# ==============================================================================
# Purpose: Deploy exporters on enabled nodes and the full observability stack on brain.
# Note: Optional add-on for servers with sufficient resources.
# ==============================================================================

- name: "Deploy Metrics Exporters (Brain + Muscle)"
  hosts: all
  become: true
  gather_facts: true
  tags: [observability, monitoring, exporters, node_exporter, cadvisor]
  pre_tasks:
    - name: "Preflight: Require overlay-network ansible_host for observability operations"
      ansible.builtin.assert:
        that:
          - ansible_host is defined
          - >-
            lookup(
              'ansible.builtin.pipe',
              "python3 -c 'import ipaddress,sys; "
              ~ "host=sys.argv[1]; subnet=sys.argv[2]; "
              ~ "\ntry:\n print(ipaddress.ip_address(host) in ipaddress.ip_network(subnet, strict=False))"
              ~ "\nexcept ValueError:\n print(False)' "
              ~ (ansible_host | quote)
              ~ " "
              ~ (tailscale_subnet | quote)
            ) == 'True'
        fail_msg: >-
          Zero Trust violation on {{ inventory_hostname }}: monitoring.yml only allows
          connections through the management overlay using ansible_host inside
          {{ tailscale_subnet }}. Public bootstrap access is only permitted in site.yml.
        success_msg: >-
          Overlay transport validated for {{ inventory_hostname }} ({{ ansible_host }} in {{ tailscale_subnet }}).
  roles:
    - role: observability
      vars:
        observability_prepare_exporters: true
        observability_prepare_stack: false
      when: enable_metrics_exporters | default(false) | bool

- name: "Deploy Observability Stack (Optional Add-on)"
  hosts: brain
  become: true
  gather_facts: true
  tags: [observability, monitoring, stack, observability_stack, victoriametrics, loki, grafana]
  pre_tasks:
    - name: "Preflight: Require overlay-network ansible_host for observability operations"
      ansible.builtin.assert:
        that:
          - ansible_host is defined
          - >-
            lookup(
              'ansible.builtin.pipe',
              "python3 -c 'import ipaddress,sys; "
              ~ "host=sys.argv[1]; subnet=sys.argv[2]; "
              ~ "\ntry:\n print(ipaddress.ip_address(host) in ipaddress.ip_network(subnet, strict=False))"
              ~ "\nexcept ValueError:\n print(False)' "
              ~ (ansible_host | quote)
              ~ " "
              ~ (tailscale_subnet | quote)
            ) == 'True'
        fail_msg: >-
          Zero Trust violation on {{ inventory_hostname }}: monitoring.yml only allows
          connections through the management overlay using ansible_host inside
          {{ tailscale_subnet }}. Public bootstrap access is only permitted in site.yml.
        success_msg: >-
          Overlay transport validated for {{ inventory_hostname }} ({{ ansible_host }} in {{ tailscale_subnet }}).

    - name: Preflight | Ensure observability stack hosting is enabled on brain
      ansible.builtin.assert:
        that:
          - enable_observability_stack | default(false) | bool
        fail_msg: >-
          enable_observability_stack is false for {{ inventory_hostname }}.
          Set enable_observability_stack: true in group_vars/brain/main.yml to run monitoring.yml.
        success_msg: "Observability stack hosting enabled on {{ inventory_hostname }}."
  roles:
    - role: observability
      vars:
        observability_prepare_exporters: false
        observability_prepare_stack: true
