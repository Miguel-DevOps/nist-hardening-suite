# ==============================================================================
# NIST HARDENING SUITE | Optional Observability Stack
# ==============================================================================
# Purpose: Deploy VictoriaMetrics/Grafana/Loki/Uptime Kuma (Brain only)
# Note: Optional add-on for servers with sufficient resources.
