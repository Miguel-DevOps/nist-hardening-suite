x-metabase-env: &metabase_env
  # Application
  - MB_SITE_NAME=${METABASE_SITE_NAME}
  - MB_SITE_URL=${METABASE_SITE_URL}
  - JAVA_TIMEZONE=${METABASE_JAVA_TIMEZONE}

  # Database
  - MB_DB_TYPE=postgres
  - MB_DB_DBNAME=${METABASE_DB_NAME}
  - MB_DB_PORT=${METABASE_DB_PORT}
  - MB_DB_USER=${METABASE_DB_USER}
  - MB_DB_PASS=${METABASE_DB_PASSWORD}
  - MB_DB_HOST=${METABASE_DB_HOST}

  # Performance & Cache
  - MB_QUERY_CACHING_MAX_KB=${METABASE_QUERY_CACHING_MAX_KB}
  - MB_QUERY_CACHING_MAX_TTL=${METABASE_QUERY_CACHING_MAX_TTL}

  # Privacy & Telemetry
  - MB_ANON_TRACKING_ENABLED=${METABASE_ANON_TRACKING_ENABLED}
  - MB_EMBEDDING_APP_ORIGIN=${METABASE_EMBEDDING_APP_ORIGIN}

services:
  metabase:
    image: ${METABASE_IMAGE:-metabase/metabase:v0.59.6.3}
    container_name: metabase
    hostname: metabase
    restart: unless-stopped

    depends_on:
      metabase-db:
        condition: service_healthy

    environment: *metabase_env

    volumes:
      - /dev/urandom:/dev/random:ro
      - metabase_plugins:/plugins

    networks:
      - internal
      - public

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --fail -I http://127.0.0.1:3000/api/health || wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/api/health || exit 1"
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  metabase-db:
    image: ${METABASE_DB_IMAGE:-postgres:17-alpine}
    container_name: metabase-db
    restart: unless-stopped

    environment:
      - POSTGRES_USER=${METABASE_DB_USER}
      - POSTGRES_PASSWORD=${METABASE_DB_PASSWORD}
      - POSTGRES_DB=${METABASE_DB_NAME}

    volumes:
      - metabase_db_data:/var/lib/postgresql/data

    networks:
      - internal

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  metabase_db_data: {}
  metabase_plugins: {}

networks:
  public:
    external: true

  internal:
    driver: bridge
