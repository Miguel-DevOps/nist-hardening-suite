x-n8n-env: &n8n_env
  - N8N_HOST=${N8N_HOST}
  - N8N_PORT=5678
  - N8N_PROTOCOL=${N8N_PROTOCOL:-https}
  - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL}
  - WEBHOOK_URL=${WEBHOOK_URL}
  - N8N_PROXY_HOPS=${N8N_PROXY_HOPS:-1}
  - EXECUTIONS_MODE=${EXECUTIONS_MODE:-queue}
  - QUEUE_BULL_REDIS_HOST=${N8N_REDIS_HOST}
  - QUEUE_BULL_REDIS_PORT=${N8N_REDIS_PORT}
  - QUEUE_BULL_REDIS_PASSWORD=${N8N_REDIS_PASSWORD}
  - DB_TYPE=${N8N_DB_TYPE}
  - DB_POSTGRESDB_HOST=${N8N_DB_POSTGRESDB_HOST}
  - DB_POSTGRESDB_PORT=${N8N_DB_POSTGRESDB_PORT}
  - DB_POSTGRESDB_DATABASE=${N8N_DB_POSTGRESDB_DATABASE}
  - DB_POSTGRESDB_USER=${N8N_DB_POSTGRESDB_USER}
  - DB_POSTGRESDB_PASSWORD=${N8N_DB_POSTGRESDB_PASSWORD}
  - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE}
  - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
  - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}

services:
  n8n:
    image: n8nio/n8n:2.15.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n
    environment: *n8n_env
    networks:
      - n8n_internal
      - public_net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5678/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  n8n-worker:
    image: n8nio/n8n:2.15.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    command: worker
    volumes:
      - n8n_data:/home/node/.n8n
    environment: *n8n_env
    networks:
      - n8n_internal

  postgres:
    image: ${N8N_DB_IMAGE:-postgres:17}
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${N8N_DB_POSTGRESDB_USER}
      - POSTGRES_PASSWORD=${N8N_DB_POSTGRESDB_PASSWORD}
      - POSTGRES_DB=${N8N_DB_POSTGRESDB_DATABASE}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - n8n_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: ${N8N_VALKEY_IMAGE:-valkey/valkey:9.0.3}
    restart: unless-stopped
    command: ["valkey-server", "--save", "", "--appendonly", "no", "--requirepass", "${N8N_REDIS_PASSWORD}"]
    volumes:
      - valkey_data:/data
    networks:
      - n8n_internal
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli -a $${N8N_REDIS_PASSWORD} ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  n8n_data: {}
  postgres_data: {}
  valkey_data: {}

networks:
  public_net:
    external: true
  n8n_internal:
    driver: bridge
