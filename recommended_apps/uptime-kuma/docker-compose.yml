services:
  uptime-kuma:
    image: ${UPTIME_KUMA_IMAGE:-louislam/uptime-kuma:2.0.2}
    container_name: uptime-kuma
    hostname: uptime-kuma
    restart: unless-stopped

    security_opt:
      - no-new-privileges:true

    volumes:
      - uptime_kuma_data:/app/data

    networks:
      - public

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f http://127.0.0.1:3001/ || wget --no-verbose --tries=1 --spider http://127.0.0.1:3001/ || exit 1"
        ]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  uptime_kuma_data: {}

networks:
  public:
    external: true
