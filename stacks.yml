---
# ==============================================================================
# NIST HARDENING SUITE | Developmi | Miguel Lozano (SRE & FinOps Architect)
# ==============================================================================
# CORE STACKS - Application Layer
# ==============================================================================
# Purpose: Deploy the management layer (Portainer) and ingress layer (Caddy).
# ==============================================================================

# ------------------------------------------------------------------------------
# 1. INGRESS STACK (Caddy WAF)
# ------------------------------------------------------------------------------
- name: "Deploy Ingress Core (Caddy)"
  hosts: all
  become: true
  tags: [ingress, caddy]
  pre_tasks:
    - name: "Preflight: Require overlay-network ansible_host for stack operations"
      ansible.builtin.assert:
        that:
          - ansible_host is defined
          - >-
            lookup(
              'ansible.builtin.pipe',
              "python3 -c 'import ipaddress,sys; "
              ~ "host=sys.argv[1]; subnet=sys.argv[2]; "
              ~ "\ntry:\n print(ipaddress.ip_address(host) in ipaddress.ip_network(subnet, strict=False))"
              ~ "\nexcept ValueError:\n print(False)' "
              ~ (ansible_host | quote)
              ~ " "
              ~ (tailscale_subnet | quote)
            ) == 'True'
        fail_msg: >-
          Zero Trust violation on {{ inventory_hostname }}: stacks.yml only allows
          connections through the management overlay using ansible_host inside
          {{ tailscale_subnet }}. Public bootstrap access is only permitted in site.yml.
        success_msg: >-
          Overlay transport validated for {{ inventory_hostname }} ({{ ansible_host }} in {{ tailscale_subnet }}).
  roles:
    - stack_ingress
# ------------------------------------------------------------------------------
# 2. PORTAINER MANAGEMENT STACK
# ------------------------------------------------------------------------------
# Server on Brain (UI) + Agents on Muscles
# Configuration: roles/stack_portainer
