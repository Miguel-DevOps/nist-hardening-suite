---
repos:
  # Detect secrets (API keys, passwords, tokens) - CRITICAL for security
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: |
          (?x)^(
            roles/.*/(defaults|vars)/.*\.yml|
            group_vars/.*\.yml|
            .secrets.baseline
          )$

  # Pre-commit standard file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ["--unsafe"] # Allow Jinja2 templates
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # Ansible-lint for playbook best practices
  - repo: https://github.com/ansible/ansible-lint
    rev: v26.4.0
    hooks:
      - id: ansible-lint
        files: ^(site|stacks|monitoring|nuke)\.yml$|^roles/.*\.yml$|^group_vars/.*\.yml$
        additional_dependencies:
          - ansible-core==2.20.4

  # YAML validation with strict rules
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [--strict, --format, colored]
        exclude: |
          (?x)^(
            roles/.*/templates/.*\.j2|
            group_vars/.*/(secrets|vault).*\.yml
          )$

  # Shell script validation
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: [--severity=warning]
        exclude: ^roles/.*/templates/

  # Markdown formatting (policy: pnpm only, no npm)
  - repo: local
    hooks:
      - id: prettier-pnpm
        name: prettier (pnpm)
        entry: pnpm dlx prettier@3.8.1 --write
        language: system
        types: [markdown]

ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from hooks

    Fixes applied automatically for security and style.
  autofix_prs: true
  autoupdate_schedule: weekly
  autoupdate_commit_msg: "[pre-commit.ci] pre-commit autoupdate"
