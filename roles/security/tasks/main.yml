      - "  - Public IPs: {{ fail2ban_public_ips | join(', ') if (fail2ban_public_ips | length > 0) else 'N/A' }}"
      - "  - {{ tailscale_subnet }} (Tailscale subnet)"
      - ""
      - "{% if cloud_provider == 'oci' %}🔴 OCI KILLSWITCH APPLIED:{% endif %}"
      - "{% if cloud_provider == 'oci' %}  - Oracle iptables rules: FLUSHED{% endif %}"
      - "{% if cloud_provider == 'oci' %}  - Oracle Cloud Agent: DISABLED & MASKED{% endif %}"
      - "{% if cloud_provider == 'oci' %}  - UFW now controls all filtering{% endif %}"
      - ""
      - "⚠️  IMPORTANT:"
      - "  {% if ansible_host.startswith('100.') %}- Public bootstrap SSH removed after switching inventory to Tailscale IPs{% else %}- Finish bootstrap, update inventory to Tailscale IPs, then rerun security to remove public SSH{% endif %}"
      - "  - Ansible connects via Tailscale mesh"
      - "  - Public SSH is intended only for bootstrap and recovery windows"
      - "========================================="
