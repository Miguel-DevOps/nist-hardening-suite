# ---
# COMPLIANCE WARNING:
# This role may reference sensitive network, user, or credential settings for observability stack.
# Do NOT expose, override, or parametrize these values in group_vars/all. Only manage via inventory, secrets, or vault with compliance review.
# ---
---
- name: Prepare exporters assets
  ansible.builtin.include_tasks: exporters.yml
  when: observability_prepare_exporters | default(enable_metrics_exporters | default(false) | bool)

- name: Prepare observability stack assets
  ansible.builtin.include_tasks: stack.yml
  when: observability_prepare_stack | default(enable_observability_stack | default(false) | bool)