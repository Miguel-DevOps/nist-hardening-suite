      - ""
      - "🌐 Mode: Bridge network with port mapping"
      - "🔧 Image: {{ caddy_image }}"
      - "🔒 WAF: Enabled (Rate Limiting + ModSecurity rules)"
      - ""
      - "📡 Published Ports (Bridge Network):"
      - "  - 80/tcp  → HTTP"
      - "  - 443/tcp → HTTPS (Auto TLS)"
      - "  - 443/udp → HTTP/3"
      - "  - 2020    → Health Check (localhost-only check, not published)"
      - ""
      - "🔗 Configured Domains:"
      - "  - example-domain.com → app-backend:8000"
      - "  - portainer.example.com → portainer:9000 (VPN-only)"
      - ""
      - "🏷️  Container Status: {{ caddy_container_info.container.State.Status | default('unknown') }}"
      - "👤 Runtime User: {{ caddy_container_info.container.Config.User | default('unset') }}"
      - "========================================="
