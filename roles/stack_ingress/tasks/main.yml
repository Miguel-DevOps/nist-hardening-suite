# ---
# COMPLIANCE WARNING:
# This role manages Caddy user/group, network, and proxy settings. These are security-critical.
# Do NOT expose, override, or parametrize these values in group_vars/all. Only manage via inventory, secrets, or vault with compliance review.
# ---
---
# ==============================================================================
# STACK INGRESS - Caddy Proxy with WAF (STANDALONE MODE)
# ==============================================================================
# Responsabilidades:
#   - Desplegar Caddy como proxy reverso en Brain (Hetzner)
#   - Bridge network with port mapping (preserves client IP via Docker routing)
#   - Configurar reverse proxy manual via Caddyfile
#   - Uso de community.docker.docker_compose_v2
# ==============================================================================

# ------------------------------------------------------------------------------
# USUARIO DE SERVICIO DEDICADO (AC-2 | NIST 800-53)
# ------------------------------------------------------------------------------
- name: Preflight | Assert Caddy UID/GID are aligned with caddy-waf image
  ansible.builtin.assert:
    that:
      - caddy_user_uid | int == 1337
      - caddy_user_gid | int == 1337
    fail_msg: >-
      caddy_user_uid/caddy_user_gid must be 1337:1337 for the pinned caddy-waf image.
      Update group_vars/all/images.yml before deploy.
    success_msg: "Caddy UID/GID preflight is aligned to 1337:1337."
  tags: [nist, ac-2]

- name: Preflight | Assert ingress compose policies are valid
  ansible.builtin.assert:
    that:
      - ingress_compose_pull_policy in ['always', 'missing', 'never', 'policy']
      - ingress_compose_recreate_policy in ['always', 'never', 'auto']
      - ingress_compose_wait_timeout | int > 0
    fail_msg: >-
      Invalid ingress compose policy configuration. Expected:
      ingress_compose_pull_policy in [always, missing, never, policy],
      ingress_compose_recreate_policy in [always, never, auto],
      ingress_compose_wait_timeout > 0.
    success_msg: "Ingress compose policy preflight is valid."

- name: Preflight | Assert ingress routing catalog is defined
  ansible.builtin.assert:
    that:
      - ingress_services is defined
      - ingress_services | length > 0
      - ingress_security_profiles is defined
    fail_msg: >-
      ingress_services/ingress_security_profiles are required.
      Define them in group_vars/all/ingress.yml.
    success_msg: "Ingress routing catalog is present."

- name: Preflight | Assert each ingress service has required fields and valid security profile
  ansible.builtin.assert:
    that:
      - item.domain is defined
      - item.domain | length > 0
      - item.upstream is defined
      - item.upstream | length > 0
      - item.security_profile is defined
      - ingress_security_profiles[item.security_profile] is defined
    fail_msg: >-
      Invalid ingress service entry {{ item | to_nice_json }}.
      Each item requires domain, upstream, and a valid security_profile.
  loop: "{{ ingress_services }}"
  loop_control:
    label: "{{ item.domain | default('unknown-domain') }}"

- name: AC-2 | Ensure dedicated caddy system user exists (no shell, no home)
  ansible.builtin.group:
    name: caddy
    gid: "{{ caddy_user_gid | int }}"
    system: false
  tags: [nist, ac-2]

- name: AC-2 | Ensure dedicated caddy user exists with pinned UID/GID (no shell, no home)
  ansible.builtin.user:
    name: caddy
    uid: "{{ caddy_user_uid | int }}"
    group: caddy
    system: false
    create_home: false
    shell: /usr/sbin/nologin
    comment: "Caddy web server service account"
  tags: [nist, ac-2]

- name: AU-12/SI-4 | Detect Docker userns-remap to compute bind-mount ownership
  ansible.builtin.command:
    cmd: "docker info --format '{{ '{{' }}json .SecurityOptions{{ '}}' }}'" # noqa: command-instead-of-module
  register: _docker_security_opts
  changed_when: false
  failed_when: false
  tags: [nist, au-12, si-4]

- name: AU-12/SI-4 | Read dockremap subuid offset (only when userns-remap is active)
  ansible.builtin.slurp:
    src: /etc/subuid
  register: _subuid_file
  when: "'name=userns' in (_docker_security_opts.stdout | default(''))"
  tags: [nist, au-12, si-4]

- name: AU-12/SI-4 | Read dockremap subgid offset (only when userns-remap is active)
  ansible.builtin.slurp:
    src: /etc/subgid
  register: _subgid_file
  when: "'name=userns' in (_docker_security_opts.stdout | default(''))"
  tags: [nist, au-12, si-4]

- name: AU-12/SI-4 | Detect Docker daemon userns-remap account
  ansible.builtin.slurp:
    src: /etc/docker/daemon.json
  register: _docker_daemon_json
  failed_when: false
  changed_when: false
  when: "'name=userns' in (_docker_security_opts.stdout | default(''))"
  tags: [nist, au-12, si-4]

- name: AU-12/SI-4 | Resolve effective userns-remap account name
  ansible.builtin.set_fact:
    _docker_userns_account: >-
      {{
        (
          (
            ((_docker_daemon_json.content | default('') | b64decode | from_json).get('userns-remap', 'default'))
            if (_docker_daemon_json.content is defined and (_docker_daemon_json.content | length > 0))
            else 'default'
          )
          | string
        )
      }}
  when: "'name=userns' in (_docker_security_opts.stdout | default(''))"
  tags: [nist, au-12, si-4]

- name: AU-12/SI-4 | Normalize userns-remap account to lookup key
  ansible.builtin.set_fact:
    _docker_userns_lookup_user: >-
      {{
        'dockremap'
        if (_docker_userns_account | lower) in ['default', '']
        else ((_docker_userns_account.split(':'))[0])
      }}
  when: "'name=userns' in (_docker_security_opts.stdout | default(''))"
  tags: [nist, au-12, si-4]

- name: AU-12/SI-4 | Resolve userns subuid offset from /etc/subuid
  ansible.builtin.command:
    cmd: "awk -F: -v u={{ _docker_userns_lookup_user | quote }} '$1==u {print $2; exit}' /etc/subuid"
  register: _dockremap_subuid_offset
  changed_when: false
  failed_when: false
  when: "'name=userns' in (_docker_security_opts.stdout | default(''))"
  tags: [nist, au-12, si-4]

- name: AU-12/SI-4 | Resolve userns subgid offset from /etc/subgid
  ansible.builtin.command:
    cmd: "awk -F: -v u={{ _docker_userns_lookup_user | quote }} '$1==u {print $2; exit}' /etc/subgid"
  register: _dockremap_subgid_offset
  changed_when: false
  failed_when: false
  when: "'name=userns' in (_docker_security_opts.stdout | default(''))"
  tags: [nist, au-12, si-4]

- name: AU-12/SI-4 | Assert userns offsets were discovered
  ansible.builtin.assert:
    that:
      - (_dockremap_subuid_offset.stdout | default('') | trim | length) > 0
      - (_dockremap_subgid_offset.stdout | default('') | trim | length) > 0
    fail_msg: >-
      Docker userns-remap is enabled but subuid/subgid offsets for {{ _docker_userns_lookup_user }}
      were not found. Verify /etc/subuid and /etc/subgid entries.
    success_msg: "Docker userns offsets detected for {{ _docker_userns_lookup_user }}."
  when: "'name=userns' in (_docker_security_opts.stdout | default(''))"
  tags: [nist, au-12, si-4]

- name: AU-12/SI-4 | Resolve effective host UID/GID for bind-mounts
  ansible.builtin.set_fact:
    _caddy_effective_uid: "{{ (_dockremap_subuid_offset.stdout | default('0') | trim | int) + (caddy_user_uid | int) }}"
    _caddy_effective_gid: "{{ (_dockremap_subgid_offset.stdout | default('0') | trim | int) + (caddy_user_gid | int) }}"
  tags: [nist, au-12, si-4]

- name: Optimize network UDP buffers for Caddy (HTTP/3)
  ansible.posix.sysctl:
    name: "{{ item }}"
    value: '7500000'
    sysctl_set: true
    state: present
    reload: true
  loop:
    - net.core.rmem_max
    - net.core.wmem_max

- name: CM-7/SC-28 | Ensure Caddy host directories exist with least-privilege ownership
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: "{{ item.mode }}"
    owner: "{{ caddy_user_uid | int }}"
    group: "{{ caddy_user_gid | int }}"
  loop:
    - { path: "/etc/caddy", mode: "0750" }
    - { path: "/var/www/html", mode: "0755" }
  tags: [nist, cm-7, sc-28]

- name: Ensure ingress stack directory exists
  ansible.builtin.file:
    path: "{{ app_base_dir }}/ingress"
    state: directory
    mode: "0755"
    owner: root
    group: root

- name: Ensure bind-mount parent directories are traversable for container runtime
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
    owner: root
    group: root
  loop:
    - "{{ app_base_dir | dirname }}"
    - "{{ app_base_dir }}"

- name: Create Caddy data directories for persistent storage
  ansible.builtin.file:
    path: "{{ app_base_dir }}/ingress/{{ item }}"
    state: directory
    mode: "0755"
    owner: "{{ _caddy_effective_uid | int }}"
    group: "{{ _caddy_effective_gid | int }}"
  loop:
    - "caddy-data"
    - "caddy-config"
    - "certs"

- name: AC-2 | Normalize Caddy runtime data directory ownership recursively
  ansible.builtin.file:
    path: "{{ app_base_dir }}/ingress/{{ item }}"
    state: directory
    owner: "{{ _caddy_effective_uid | int }}"
    group: "{{ _caddy_effective_gid | int }}"
    recurse: true
  loop:
    - "caddy-data"
    - "caddy-config"
  tags: [nist, ac-2]

- name: AU-12/SI-4 | Create Caddy log directory inside persistent data volume
  ansible.builtin.file:
    path: "{{ app_base_dir }}/ingress/caddy-data/logs"
    state: directory
    mode: "0755"
    owner: "{{ _caddy_effective_uid | int }}"
    group: "{{ _caddy_effective_gid | int }}"
  tags: [nist, au-12, si-4]

- name: AU-12/SI-4 | Ensure Caddy access log file exists and is writable by Caddy user
  ansible.builtin.file:
    path: "{{ app_base_dir }}/ingress/caddy-data/logs/access.log"
    state: touch
    mode: "0640"
    owner: "{{ _caddy_effective_uid | int }}"
    group: "{{ _caddy_effective_gid | int }}"
  tags: [nist, au-12, si-4]

- name: AU-12/SI-4 | Ensure Coraza audit log file exists and is writable by Caddy user
  ansible.builtin.file:
    path: "{{ app_base_dir }}/ingress/caddy-data/logs/coraza-audit.log"
    state: touch
    mode: "0640"
    owner: "{{ _caddy_effective_uid | int }}"
    group: "{{ _caddy_effective_gid | int }}"
  tags: [nist, au-12, si-4]

- name: AU-12/SI-4 | Ensure ACL tooling is installed for log access controls
  ansible.builtin.apt:
    name: acl
    state: present
    lock_timeout: 600
  tags: [nist, au-12, si-4]

- name: AU-12/SI-4 | Detect canonical crowdsec account
  ansible.builtin.getent:
    database: passwd
    key: crowdsec
    fail_key: false
  register: crowdsec_user_getent
  tags: [nist, au-12, si-4]
- name: AU-12/SI-4 | Find CrowdSec systemd unit file
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - /etc/systemd/system/crowdsec.service
    - /lib/systemd/system/crowdsec.service
    - /usr/lib/systemd/system/crowdsec.service
  register: _crowdsec_unit_stat
  tags: [nist, au-12, si-4]
- name: AU-12/SI-4 | Read CrowdSec systemd unit file
  ansible.builtin.slurp:
    src: "{{ (_crowdsec_unit_stat.results | selectattr('stat.exists') | first).item }}"
  register: _crowdsec_unit_content
  when: _crowdsec_unit_stat.results | selectattr('stat.exists') | list | length > 0
  tags: [nist, au-12, si-4]
- name: AU-12/SI-4 | Detect runtime CrowdSec service user
  ansible.builtin.set_fact:
    crowdsec_service_user_cmd:
      stdout: >-
        {{
          (_crowdsec_unit_content.content | default('') | b64decode)
          | regex_findall('(?m)^User=(.+)$')
          | first | default('')
        }}
  tags: [nist, au-12, si-4]

- name: AU-12/SI-4 | Resolve ACL target user for CrowdSec log access
  ansible.builtin.set_fact:
    crowdsec_acl_user: >-
      {{
        'crowdsec'
        if (crowdsec_user_getent.ansible_facts.getent_passwd | default({})).get('crowdsec') is not none
        else (
          (crowdsec_service_user_cmd.stdout | default('') | trim)
          if (
            (crowdsec_service_user_cmd.stdout | default('') | trim | length > 0)
            and (crowdsec_service_user_cmd.stdout | default('') | trim != 'root')
          )
          else ''
        )
      }}
  tags: [nist, au-12, si-4]

- name: AU-12/SI-4 | Ensure CrowdSec can traverse and read Caddy logs directory
  ansible.posix.acl:
    path: "{{ app_base_dir }}/ingress/caddy-data/logs"
    etype: user
    entity: "{{ crowdsec_acl_user }}"
    permissions: rX
    state: present
    recursive: true
  when: crowdsec_acl_user | length > 0
  tags: [nist, au-12, si-4]

- name: AU-12/SI-4 | Ensure default ACLs preserve CrowdSec read access on rotated logs
  ansible.posix.acl:
    path: "{{ app_base_dir }}/ingress/caddy-data/logs"
    etype: user
    entity: "{{ crowdsec_acl_user }}"
    permissions: rX
    default: true
    state: present
  when: crowdsec_acl_user | length > 0
  tags: [nist, au-12, si-4]

- name: AU-12/SI-4 | Ensure CrowdSec can read current Caddy access log file
  ansible.posix.acl:
    path: "{{ app_base_dir }}/ingress/caddy-data/logs/access.log"
    etype: user
    entity: "{{ crowdsec_acl_user }}"
    permissions: r--
    state: present
  when: crowdsec_acl_user | length > 0
  tags: [nist, au-12, si-4]

- name: AU-12/SI-4 | Ensure CrowdSec can read Coraza audit log file
  ansible.posix.acl:
    path: "{{ app_base_dir }}/ingress/caddy-data/logs/coraza-audit.log"
    etype: user
    entity: "{{ crowdsec_acl_user }}"
    permissions: r--
    state: present
  when: crowdsec_acl_user | length > 0
  tags: [nist, au-12, si-4]

- name: AU-12/SI-4 | Warn when CrowdSec user is missing and ACLs cannot be applied
  ansible.builtin.debug:
    msg: >-
      CrowdSec runs as root or no dedicated non-root service account was detected on {{ inventory_hostname }}.
      Skipping explicit user ACL grants on the Caddy log volume.
  when: crowdsec_acl_user | length == 0
  tags: [nist, au-12, si-4]

- name: AU-12/SI-4 | Probe Caddy log volume write access from container runtime
  ansible.builtin.command:
    cmd: >-
      docker run --rm
      --user {{ caddy_user_uid }}:{{ caddy_user_gid }}
      -v {{ app_base_dir }}/ingress/caddy-data:/data
      {{ caddy_image }}
      sh -lc 'mkdir -p /data/logs && touch /data/logs/.ansible-write-test && rm -f /data/logs/.ansible-write-test'
  register: caddy_log_volume_probe
  changed_when: false
  failed_when: false
  tags: [nist, au-12, si-4]

- name: AU-12/SI-4 | Reconcile Caddy log volume ownership when probe fails
  ansible.builtin.command:
    cmd: >-
      chown -R {{ _caddy_effective_uid | int }}:{{ _caddy_effective_gid | int }}
      {{ app_base_dir }}/ingress/caddy-data
      {{ app_base_dir }}/ingress/caddy-config
      {{ app_base_dir }}/ingress/certs
  when: caddy_log_volume_probe.rc != 0
  changed_when: true
  tags: [nist, au-12, si-4]

- name: AU-12/SI-4 | Re-probe Caddy log volume write access after reconciliation
  ansible.builtin.command:
    cmd: >-
      docker run --rm
      --user {{ caddy_user_uid }}:{{ caddy_user_gid }}
      -v {{ app_base_dir }}/ingress/caddy-data:/data
      {{ caddy_image }}
      sh -lc 'mkdir -p /data/logs && touch /data/logs/.ansible-write-test && rm -f /data/logs/.ansible-write-test'
  register: caddy_log_volume_reprobe
  changed_when: false
  failed_when: false
  when: caddy_log_volume_probe.rc != 0
  tags: [nist, au-12, si-4]

- name: AU-12/SI-4 | Capture log-volume ownership snapshot for diagnostics
  ansible.builtin.command:
    cmd: >-
      stat -c '%u:%g %a %n'
      {{ app_base_dir }}/ingress/caddy-data
      {{ app_base_dir }}/ingress/caddy-data/logs
      {{ app_base_dir }}/ingress/caddy-data/logs/access.log
      {{ app_base_dir }}/ingress/caddy-data/logs/coraza-audit.log
  register: caddy_log_volume_stat
  changed_when: false
  failed_when: false
  when: caddy_log_volume_probe.rc != 0
  tags: [nist, au-12, si-4]

- name: AU-12/SI-4 | Fail if Caddy log volume remains unwritable after remediation
  ansible.builtin.assert:
    that:
      - caddy_log_volume_probe.rc == 0 or caddy_log_volume_reprobe.rc == 0
    fail_msg: >-
      Caddy log volume is still not writable by the container runtime after ownership reconciliation.
      Check userns remapping, bind-mount ownership, and host ACLs on {{ app_base_dir }}/ingress/caddy-data.
      Probe rc={{ caddy_log_volume_probe.rc | default('n/a') }},
      Reprobe rc={{ caddy_log_volume_reprobe.rc | default('n/a') }}.
      Ownership snapshot: {{ caddy_log_volume_stat.stdout | default('unavailable') }}.
    success_msg: "Caddy log volume write access is valid."
  tags: [nist, au-12, si-4]

- name: Validate Caddyfile.j2 presence
  ansible.builtin.stat:
    path: "{{ role_path }}/templates/Caddyfile.j2"
  delegate_to: localhost
  run_once: true
  become: false
  register: caddyfile_j2_stat

- name: Fail if Caddyfile.j2 is missing
  ansible.builtin.fail:
    msg: |
      Caddyfile.j2 is missing!
      Please copy roles/stack_ingress/templates/Caddyfile.example.j2 to Caddyfile.j2 and adjust it for your deployment.
  run_once: true
  when: not caddyfile_j2_stat.stat.exists

- name: Create Caddyfile for custom configurations
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: "{{ app_base_dir }}/ingress/Caddyfile"
    mode: "0644"
    owner: "{{ caddy_user_uid }}"
    group: "{{ caddy_user_gid }}"

- name: Preflight | Gather Caddy bind-mount path metadata
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - "{{ app_base_dir | dirname }}"
    - "{{ app_base_dir }}"
    - "{{ app_base_dir }}/ingress"
    - "{{ app_base_dir }}/ingress/Caddyfile"
  register: caddy_bind_mount_stats

- name: Preflight | Assert bind-mount paths are world-traversable/readable
  ansible.builtin.assert:
    that:
      - caddy_bind_mount_stats.results[0].stat.exists
      - caddy_bind_mount_stats.results[1].stat.exists
      - caddy_bind_mount_stats.results[2].stat.exists
      - caddy_bind_mount_stats.results[3].stat.exists
      - (caddy_bind_mount_stats.results[0].stat.mode | default('0000'))[-1] in ['1', '3', '5', '7']
      - (caddy_bind_mount_stats.results[1].stat.mode | default('0000'))[-1] in ['1', '3', '5', '7']
      - (caddy_bind_mount_stats.results[2].stat.mode | default('0000'))[-1] in ['1', '3', '5', '7']
      - (caddy_bind_mount_stats.results[3].stat.mode | default('0000'))[-1] in ['4', '5', '6', '7']
    fail_msg: >-
      Caddy bind-mount path permissions are incompatible with container runtime access.
      Ensure {{ app_base_dir | dirname }}, {{ app_base_dir }}, and
      {{ app_base_dir }}/ingress are executable by others,
      and {{ app_base_dir }}/ingress/Caddyfile is readable by others.
      This is required in environments with Docker user namespace remapping.
    success_msg: "Caddy bind-mount permissions are compatible with runtime access."

- name: Ensure public_net Docker network exists
  community.docker.docker_network:
    name: public_net
    driver: bridge
    state: present

- name: Create Docker Compose file for Caddy ingress
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ app_base_dir }}/ingress/docker-compose.yml"
    mode: "0644"
    owner: root
    group: root

- name: Login to GitHub Container Registry (GHCR)
  community.docker.docker_login:
    registry_url: ghcr.io
    username: "{{ github_username }}"
    password: "{{ vault_github_token }}"
    reauthorize: true
  no_log: true

- name: Verify Caddy image digest if specified
  community.docker.docker_image_info:
    name: "{{ caddy_image }}"
  register: caddy_image_info
  when: caddy_image_digest is defined

- name: Fail if digest mismatch
  ansible.builtin.fail:
    msg: "Caddy image digest mismatch. Expected {{ caddy_image_digest }}, got {{ caddy_image_info.image.Digest }}"
  when:
    - caddy_image_digest is defined
    - caddy_image_info.image.Digest is defined
    - caddy_image_info.image.Digest != caddy_image_digest

- name: Deploy Caddy Ingress Stack with Docker Compose
  block:
    - name: Run docker compose up
      community.docker.docker_compose_v2:
        project_src: "{{ app_base_dir }}/ingress"
        state: present
        pull: "{{ ingress_compose_pull_policy }}"
        recreate: "{{ ingress_compose_recreate_policy }}"
        wait: false
      register: stack_deploy

    - name: Wait until Docker reports Caddy container as healthy
      community.docker.docker_container_info:
        name: caddy-waf
      register: caddy_health
      changed_when: false
      retries: "{{ ((ingress_compose_wait_timeout | int) + 4) // 5 }}"
      delay: 5
      until:
        - caddy_health.exists | default(false)
        - caddy_health.container.State.Status == 'running'
        - caddy_health.container.State.Health is defined
        - caddy_health.container.State.Health.Status == 'healthy'
  rescue:
    - name: Capture Caddy container startup logs
      ansible.builtin.command:
        cmd: docker logs --tail 100 caddy-waf # noqa: command-instead-of-module
      register: caddy_crash_logs
      changed_when: false
      failed_when: false

    - name: Show Caddy startup logs for diagnosis
      ansible.builtin.debug:
        msg: |
          === caddy-waf STDOUT ===
          {{ caddy_crash_logs.stdout | default('(empty)') }}
          === caddy-waf STDERR ===
          {{ caddy_crash_logs.stderr | default('(empty)') }}

    - name: Fail with deployment context
      ansible.builtin.fail:
        msg: >-
          Caddy stack deployment failed — see 'Show Caddy startup logs for diagnosis'
          above for the root cause.

- name: Get Caddy container info
  community.docker.docker_container_info:
    name: caddy-waf
  register: caddy_container_info

- name: Assert Caddy container is running
  ansible.builtin.assert:
    that:
      - caddy_container_info.exists | default(false)
      - caddy_container_info.container.State.Status == 'running'
    fail_msg: >-
      Caddy container is not running. Current state:
      {{ caddy_container_info.container.State.Status | default('missing') }}.

- name: Assert runtime user is pinned to expected UID/GID
  ansible.builtin.assert:
    that:
      - caddy_container_info.container.Config.User == (caddy_user_uid | string ~ ':' ~ caddy_user_gid | string)
    fail_msg: >-
      Caddy runtime user mismatch. Expected {{ caddy_user_uid }}:{{ caddy_user_gid }},
      got {{ caddy_container_info.container.Config.User | default('unset') }}.

- name: Validate active Caddyfile inside container (syntax/adapt)
  community.docker.docker_container_exec:
    container: caddy-waf
    command: "sh -c 'caddy adapt --config /etc/caddy/Caddyfile --adapter caddyfile >/dev/null'"
  register: caddy_validate
  changed_when: false

- name: Display Caddy Ingress deployment summary
  ansible.builtin.debug:
    msg:
      - "========================================="
      - "✅ CADDY INGRESS DEPLOYED (STANDALONE)"
