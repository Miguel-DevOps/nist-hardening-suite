---
# ==============================================================================
# CROWDSEC ROLE - Collaborative Intrusion Prevention System (NIST SI-4)
# ==============================================================================
# Installs CrowdSec agent for real-time threat detection and collaborative blocking
# Provider-agnostic: works on both Hetzner and OCI
# ==============================================================================

- name: SI-4 | Validate supported OS and codename for CrowdSec repository
  ansible.builtin.assert:
    that:
      - ansible_facts['distribution'] in ['Ubuntu', 'Debian']
      - ansible_facts['distribution_release'] is defined
      - ansible_facts['distribution_release'] | length > 0
    fail_msg: "Unsupported OS or missing distro codename for CrowdSec repository setup (requires Debian/Ubuntu codename)."
  tags: [crowdsec, nist, si-4]

- name: SI-4 | Install prerequisites
  ansible.builtin.apt:
    name:
      - curl
      - gnupg
      - apt-transport-https
    state: present
  tags: [crowdsec, nist, si-4]

- name: SI-4 | Create keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  tags: [crowdsec, nist, si-4]

- name: SI-4 | Add CrowdSec GPG key (modern signed-by method)
  ansible.builtin.get_url:
    url: https://packagecloud.io/crowdsec/crowdsec/gpgkey
    dest: /etc/apt/keyrings/crowdsec.asc
    mode: '0644'
  retries: 3
  delay: 5
  tags: [crowdsec, nist, si-4]

- name: SI-4 | Add CrowdSec repository (Ubuntu)
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/crowdsec.asc] https://packagecloud.io/crowdsec/crowdsec/ubuntu/ {{ ansible_facts['distribution_release'] }} main"
    state: present
    filename: crowdsec
    update_cache: true
  when: ansible_facts['distribution'] == 'Ubuntu'
  tags: [crowdsec, nist, si-4]

- name: SI-4 | Add CrowdSec repository (Debian)
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/crowdsec.asc] https://packagecloud.io/crowdsec/crowdsec/debian/ {{ ansible_facts['distribution_release'] }} main"
    state: present
    filename: crowdsec
    update_cache: true
  when: ansible_facts['distribution'] == 'Debian'
  tags: [crowdsec, nist, si-4]

- name: SI-4 | Install CrowdSec agent
  ansible.builtin.apt:
    name:
      - crowdsec
      - crowdsec-firewall-bouncer-iptables
    state: present
  tags: [crowdsec, nist, si-4]

- name: SI-4 | Configure CrowdSec for local context
  ansible.builtin.copy:
    dest: /etc/crowdsec/config.yaml.local
    content: |
      common:
        log_level: info
        daemonize: true

      cscli:
        output: human

      crowdsec_service:
        acquisition_path: /etc/crowdsec/acquis.yaml
        parser_routines: 1

      api:
        client:
          credentials_path: /etc/crowdsec/local_api_credentials.yaml
        server:
          listen_uri: 127.0.0.1:8080
          profiles_path: /etc/crowdsec/profiles.yaml
    mode: '0640'
  notify: Restart CrowdSec
  tags: [crowdsec, nist, si-4]

- name: SI-4 | Configure log acquisition (syslog/auth + Caddy structured logs)
  ansible.builtin.copy:
    dest: /etc/crowdsec/acquis.yaml
    content: |
      ---
      # syslog / SSH logs
      filenames:
        - /var/log/auth.log
        - /var/log/syslog
      labels:
        type: syslog
      ---
      # Caddy structured JSON access logs (SI-4 / AU-12)
      filenames:
        - /var/log/caddy/*.log
      labels:
        type: caddy
    mode: '0640'
  notify: Restart CrowdSec
  tags: [crowdsec, nist, si-4]

- name: SI-4 | Initialize CrowdSec local API
  ansible.builtin.command: cscli machines add -a
  args:
    creates: /etc/crowdsec/local_api_credentials.yaml
  tags: [crowdsec, nist, si-4]

- name: SI-4 | List CrowdSec bouncers
  ansible.builtin.command: cscli bouncers list -o raw
  register: crowdsec_bouncers_list
  changed_when: false
  tags: [crowdsec, nist, si-4]

- name: SI-4 | Register firewall bouncer
  ansible.builtin.command: cscli bouncers add firewall-bouncer
  register: bouncer_add
  when: "'firewall-bouncer' not in crowdsec_bouncers_list.stdout"
  changed_when: true
  tags: [crowdsec, nist, si-4]

- name: SI-4 | Validate CrowdSec configuration before service operations
  ansible.builtin.command: crowdsec -c /etc/crowdsec/config.yaml -t -error
  register: crowdsec_config_test
  changed_when: false
  tags: [crowdsec, nist, si-4]

- name: SI-4 | Enable and start CrowdSec service
  ansible.builtin.systemd:
    name: crowdsec
    state: started
    enabled: true
  tags: [crowdsec, nist, si-4]

- name: SI-4 | Enable and start firewall bouncer
  ansible.builtin.systemd:
    name: crowdsec-firewall-bouncer
    state: started
    enabled: true
  tags: [crowdsec, nist, si-4]

- name: SI-4 | Install base security collection (Linux)
  ansible.builtin.command: cscli collections install crowdsecurity/linux
  register: collections_linux
  changed_when: "'already installed' not in collections_linux.stdout"
  tags: [crowdsec, nist, si-4]

- name: SI-4 | Install Caddy log parser collection (AU-12)
  ansible.builtin.command: cscli collections install crowdsecurity/caddy
  register: collections_caddy
  changed_when: "'already installed' not in collections_caddy.stdout"
  tags: [crowdsec, nist, si-4, au-12]

- name: SI-4 | Configure hybrid signal sharing (optional - requires console API key)
  block:
    - name: Check if CrowdSec console key is provided
      ansible.builtin.assert:
        that: crowdsec_console_key is defined
        msg: "CrowdSec console key not defined. Set 'crowdsec_console_key' in vault for hybrid signal sharing."

    - name: Enroll in CrowdSec Console for hybrid signal sharing
      ansible.builtin.command: cscli console enroll {{ crowdsec_console_key }}
      args:
        creates: "/etc/crowdsec/online_api_credentials.yaml"
      no_log: true
      notify: Restart CrowdSec
  when: crowdsec_console_key is defined
  tags: [crowdsec, nist, si-4]

- name: SI-4 | Verify CrowdSec installation
  ansible.builtin.command: cscli version
  register: crowdsec_version
  changed_when: false
  tags: [crowdsec, nist, si-4]

- name: SI-4 | Display CrowdSec status
  ansible.builtin.debug:
    msg:
      - "CrowdSec IPS Active (NIST SI-4)"
      - "   Version: {{ crowdsec_version.stdout }}"
      - "   Mode: {{ 'Hybrid (console enrolled)' if crowdsec_console_key is defined else 'Local detection' }}"
      - "   Collections: crowdsecurity/linux, crowdsecurity/caddy"
      - "   Bouncer: crowdsec-firewall-bouncer-iptables"
      - "   Logs monitored: /var/log/auth.log, /var/log/syslog, /var/log/caddy/*.log"
  tags: [crowdsec, nist, si-4]

- name: SI-4 | Deploy CrowdSec monitoring script
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/scripts/monitor-crowdsec.sh"
    dest: /usr/local/bin/monitor-crowdsec
    mode: '0755'
    owner: root
    group: root
  tags: [crowdsec, nist, si-4, monitoring]

- name: SI-4 | Display monitoring instructions
  ansible.builtin.debug:
    msg:
      - ""
      - "CrowdSec Monitoring Available:"
      - "   Run: monitor-crowdsec --status"
      - "   JSON output: monitor-crowdsec --json"
      - "   For extended monitoring features, refer to project documentation."
  tags: [crowdsec, nist, si-4, monitoring]
