# ---
# COMPLIANCE WARNING:
# The following system paths are hardcoded as required by compliance and operational standards.
# Do NOT parametrize or expose these values unless a compliance review is performed.
# ---
---
# ==============================================================================
# COMMON ROLE - Base System Configuration
# ==============================================================================

- name: "🏗️  Starting base system configuration"
  ansible.builtin.debug:
    msg: "Configuring base system packages, timezone, locale, and limits"

- name: Refresh apt cache safely
  ansible.builtin.import_tasks: apt_refresh.yml

- name: Install software-properties-common
  ansible.builtin.apt:
    name: software-properties-common
    state: present
    lock_timeout: 600

- name: Enable Universe repository (Ubuntu)
  ansible.builtin.command: add-apt-repository -y universe
  when: ansible_facts['distribution'] == 'Ubuntu'
  changed_when: false

- name: Install base system utilities
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - git
      - tar
      - jq
      - python3-pip
      - apt-transport-https
      - gnupg
      - ca-certificates
    state: present
    lock_timeout: 600

- name: Configure timezone in /etc/environment
  ansible.builtin.lineinfile:
    path: /etc/environment
    line: 'TZ=Etc/UTC'
    create: true
    mode: "{{ file_mode_default }}"
    state: present

- name: Check if swap is currently active
  ansible.builtin.command: swapon --show
  register: swap_status
  changed_when: false
  failed_when: false
  when: ansible_facts['swaptotal_mb'] > 0

- name: Disable active swap
  ansible.builtin.command: swapoff -a
  when:
    - ansible_facts['swaptotal_mb'] > 0
    - swap_status.stdout != ""
  changed_when: swap_status.stdout != ""

- name: Remove swap entries from /etc/fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: '^\s*[^#].*\sswap\s'
    state: absent
  when: ansible_facts['swaptotal_mb'] > 0

- name: Set system locale to en_US.UTF-8
  community.general.locale_gen:
    name: en_US.UTF-8
    state: present

- name: Configure system limits for applications
  community.general.pam_limits:
    domain: '*'
    limit_type: "{{ item.type }}"
    limit_item: "{{ item.item }}"
    value: "{{ item.value }}"
  loop:
    - { type: 'soft', item: 'nofile', value: "{{ systemd_nofile_soft }}" }
    - { type: 'hard', item: 'nofile', value: "{{ systemd_nofile_hard }}" }
    - { type: 'soft', item: 'nproc', value: "{{ systemd_nproc_soft }}" }
    - { type: 'hard', item: 'nproc', value: "{{ systemd_nproc_hard }}" }

- name: Enable automatic security updates
  ansible.builtin.apt:
    name: unattended-upgrades
    state: present
    lock_timeout: 600

- name: Configure unattended-upgrades for security only
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    content: |
      Unattended-Upgrade::Allowed-Origins {
        "${distro_id}:${distro_codename}-security";
      };
      Unattended-Upgrade::AutoFixInterruptedDpkg "true";
      Unattended-Upgrade::MinimalSteps "true";
      Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";
      Unattended-Upgrade::Remove-Unused-Dependencies "true";
      Unattended-Upgrade::Automatic-Reboot "false";
    mode: "{{ file_mode_default }}"

- name: Set hostname based on inventory name
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"
  when: inventory_hostname != ansible_facts['hostname']

- name: "✅ Base system configuration complete"
  ansible.builtin.debug:
    msg: "Base system configured: packages, timezone, locale, limits, automatic updates"
